version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongodb:27017/techiegram
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=supersecretkeytechiegram1234!
    depends_on:
      - mongodb
      - redis

  ai-service:
    build:
      context: ./ai-service
      dockerfile: requirements.txt  # FastAPI builder custom config
    image: python:3.10-slim
    command: sh -c "pip install -r requirements.txt && uvicorn main:app --host 0.0.0.0 --port 8000"
    volumes:
      - ./ai-service:/app
    working_dir: /app
    ports:
      - "8000:8000"
    depends_on:
      - mongodb

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - ai-service

volumes:
  mongo-data:
